location ~* ^.+\.php$ {
    deny all;
    return 403;
}

location / {
    try_files $uri $uri/ =404;
}

location ~ ^/(config|tmp|core|lang) {
    deny all;
    return 403;
}

location ~ /\.ht {
    deny  all;
    return 403;
}
